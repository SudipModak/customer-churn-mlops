
version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: churn-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Sudip@2003
      MYSQL_DATABASE: churn_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pSudip@2003"]
      interval: 10s
      timeout: 5s
      retries: 10

  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi.Dockerfile

    container_name: churn-fastapi
    restart: always

    ports:
      - "8000:8000"

    depends_on:
      mysql:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile

    container_name: churn-streamlit
    restart: always

    ports:
      - "8501:8501"

    depends_on:
      - fastapi

volumes:
  mysql_data:

