name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Application
        run: |
          cd ~/customer-churn-mlops

          git pull origin main

          docker compose down || true

          docker compose up --build -d

          docker image prune -f